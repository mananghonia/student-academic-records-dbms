<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 740" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .entity { fill: #ffffff; stroke: #1a1a1a; stroke-width: 1.6; }
    .attr   { fill: #ffffff; stroke: #1a1a1a; stroke-width: 1.2; }
    .rel    { fill: #ffffff; stroke: #1a1a1a; stroke-width: 1.4; }
    .link   { stroke: #1a1a1a; stroke-width: 1.2; fill: none; }
    .ename  { font-size: 14px; font-weight: 600; text-anchor: middle; fill: #1a1a1a; }
    .aname  { font-size: 12px; text-anchor: middle; fill: #1a1a1a; }
    .rname  { font-size: 12px; font-weight: 600; text-anchor: middle; fill: #1a1a1a; }
    .card   { font-size: 12px; fill: #1a1a1a; }
  </style>

  <rect x="0" y="0" width="1120" height="740" fill="#ffffff"/>

  <!-- ================= STUDENTS entity + attributes ================= -->
  <line class="link" x1="120" y1="225" x2="255" y2="248"/>
  <line class="link" x1="195" y1="182" x2="265" y2="240"/>
  <line class="link" x1="288" y1="142" x2="295" y2="240"/>
  <line class="link" x1="392" y1="162" x2="330" y2="240"/>
  <line class="link" x1="465" y1="212" x2="360" y2="250"/>

  <ellipse class="attr" cx="105" cy="220" rx="58" ry="24"/>
  <text class="aname" x="105" y="225">FULL_NAME</text>

  <ellipse class="attr" cx="185" cy="172" rx="52" ry="24"/>
  <text class="aname" x="185" y="177" text-decoration="underline">ROLL_NO</text>

  <ellipse class="attr" cx="288" cy="120" rx="45" ry="22"/>
  <text class="aname" x="288" y="125">CITY</text>

  <ellipse class="attr" cx="398" cy="140" rx="50" ry="24"/>
  <text class="aname" x="398" y="145">MOBILE</text>

  <ellipse class="attr" cx="482" cy="196" rx="52" ry="24"/>
  <text class="aname" x="482" y="201">GENDER</text>

  <rect class="entity" x="230" y="240" width="130" height="52"/>
  <text class="ename" x="295" y="271">STUDENTS</text>

  <!-- ================= SEM_SECTION entity + attributes ================= -->
  <line class="link" x1="742" y1="168" x2="820" y2="240"/>
  <line class="link" x1="862" y1="142" x2="865" y2="240"/>
  <line class="link" x1="982" y1="172" x2="905" y2="240"/>

  <ellipse class="attr" cx="738" cy="145" rx="48" ry="24"/>
  <text class="aname" x="738" y="150" text-decoration="underline">SEC_ID</text>

  <ellipse class="attr" cx="862" cy="118" rx="58" ry="24"/>
  <text class="aname" x="862" y="123">SEMESTER</text>

  <ellipse class="attr" cx="990" cy="150" rx="52" ry="24"/>
  <text class="aname" x="990" y="155">SECTION</text>

  <rect class="entity" x="790" y="240" width="150" height="52"/>
  <text class="ename" x="865" y="271">SEM_SECTION</text>

  <!-- ================= ENROLLS_IN relationship ================= -->
  <line class="link" x1="360" y1="266" x2="505" y2="266"/>
  <line class="link" x1="665" y1="266" x2="790" y2="266"/>
  <polygon class="rel" points="505,266 585,228 665,266 585,304"/>
  <text class="rname" x="585" y="270">ENROLLS_IN</text>
  <text class="card" x="372" y="288">(1,1)</text>
  <text class="card" x="478" y="258">n</text>
  <text class="card" x="678" y="258">1</text>
  <text class="card" x="722" y="252">(1,n)</text>

  <!-- ================= SCORES relationship (STUDENTS - INTERNAL_MARKS) ================= -->
  <line class="link" x1="295" y1="292" x2="295" y2="398"/>
  <line class="link" x1="295" y1="462" x2="295" y2="530"/>
  <polygon class="rel" points="233,430 295,398 357,430 295,462"/>
  <text class="rname" x="295" y="434">SCORES</text>
  <text class="card" x="305" y="322">(2,3)</text>
  <text class="card" x="303" y="382">m</text>
  <text class="card" x="303" y="482">n</text>
  <text class="card" x="305" y="512">(1,n)</text>

  <!-- ================= INTERNAL_MARKS entity + attributes ================= -->
  <line class="link" x1="132" y1="512" x2="230" y2="542"/>
  <line class="link" x1="145" y1="580" x2="230" y2="565"/>
  <line class="link" x1="182" y1="638" x2="262" y2="582"/>
  <line class="link" x1="288" y1="653" x2="305" y2="582"/>

  <ellipse class="attr" cx="98" cy="505" rx="42" ry="22"/>
  <text class="aname" x="98" y="510">Test1</text>

  <ellipse class="attr" cx="108" cy="585" rx="42" ry="22"/>
  <text class="aname" x="108" y="590">Test2</text>

  <ellipse class="attr" cx="158" cy="655" rx="42" ry="22"/>
  <text class="aname" x="158" y="660">Test3</text>

  <ellipse class="attr" cx="292" cy="675" rx="50" ry="22" stroke-dasharray="5,4"/>
  <text class="aname" x="292" y="680">Final_IA</text>

  <rect class="entity" x="230" y="530" width="160" height="52"/>
  <text class="ename" x="310" y="561">INTERNAL_MARKS</text>

  <!-- ================= SECTION_MARKS relationship (INTERNAL_MARKS - SEM_SECTION) ================= -->
  <line class="link" x1="390" y1="545" x2="505" y2="440"/>
  <line class="link" x1="675" y1="440" x2="865" y2="292"/>
  <polygon class="rel" points="505,440 590,404 675,440 590,476"/>
  <text class="rname" x="590" y="444">SECTION_MARKS</text>
  <text class="card" x="400" y="522">(1,n)</text>
  <text class="card" x="468" y="468">n</text>
  <text class="card" x="700" y="416">m</text>
  <text class="card" x="836" y="322">(m,n)</text>

  <!-- ================= EVALUATED_IN relationship (INTERNAL_MARKS - COURSES) ================= -->
  <line class="link" x1="345" y1="582" x2="510" y2="635"/>
  <line class="link" x1="670" y1="635" x2="815" y2="582"/>
  <polygon class="rel" points="510,635 590,601 670,635 590,669"/>
  <text class="rname" x="590" y="639">EVALUATED_IN</text>
  <text class="card" x="352" y="608">(0,n)</text>
  <text class="card" x="452" y="632">3</text>
  <text class="card" x="702" y="618">M</text>
  <text class="card" x="742" y="580">(1,3)</text>

  <!-- ================= COURSES entity + attributes ================= -->
  <line class="link" x1="742" y1="472" x2="822" y2="530"/>
  <line class="link" x1="882" y1="469" x2="868" y2="530"/>
  <line class="link" x1="988" y1="500" x2="922" y2="532"/>
  <line class="link" x1="1005" y1="562" x2="930" y2="558"/>

  <ellipse class="attr" cx="732" cy="452" rx="66" ry="24"/>
  <text class="aname" x="732" y="457" text-decoration="underline">COURSE_CODE</text>

  <ellipse class="attr" cx="888" cy="445" rx="64" ry="24"/>
  <text class="aname" x="888" y="450">COURSE_TITLE</text>

  <ellipse class="attr" cx="1012" cy="482" rx="56" ry="24"/>
  <text class="aname" x="1012" y="487">SEMESTER</text>

  <ellipse class="attr" cx="1050" cy="565" rx="50" ry="22"/>
  <text class="aname" x="1050" y="570">CREDITS</text>

  <rect class="entity" x="790" y="530" width="140" height="52"/>
  <text class="ename" x="860" y="561">COURSES</text>
</svg>
